services:
  frontend:
    build:
      context: ./chessReview
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    depends_on:
      - backend
    networks:
      - chess-network
    restart: unless-stopped

  backend:
    build:
      context: ./chessBackend
      dockerfile: Dockerfile
    environment:
      - PORT=5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANALYSIS_CONCURRENCY=${ANALYSIS_CONCURRENCY:-1}
      - ANALYSIS_WORKERS=${ANALYSIS_WORKERS:-2}
      - ANALYSIS_DEPTH=${ANALYSIS_DEPTH:-14}
      - ANALYSIS_SECONDS_PER_POSITION=${ANALYSIS_SECONDS_PER_POSITION:-5}
      - MAX_ANALYSIS_PLIES=${MAX_ANALYSIS_PLIES:-300}
      - MAX_PGN_CHARS=${MAX_PGN_CHARS:-200000}
    ports:
      - "8081:5000"
    networks:
      - chess-network
    restart: unless-stopped

networks:
  chess-network:
    driver: bridge
